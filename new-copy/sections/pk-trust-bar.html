<style>
.pk-trustbar {
  background: #ffffff;
  border-top: 1px solid #e0dcd5;
  border-bottom: 1px solid #e0dcd5;
  height: 80px;
  display: flex;
  align-items: center;
  padding: 0 32px;
  overflow-x: auto;
  -ms-overflow-style: none;
  scrollbar-width: none;
}
.pk-trustbar::-webkit-scrollbar { display: none; }
.pk-trustbar__inner {
  display: flex;
  align-items: center;
  gap: 48px;
  min-width: max-content;
  margin: 0 auto;
}
.pk-trustbar__label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: #a89060;
  white-space: nowrap;
  font-family: 'Inter', sans-serif;
}
.pk-trustbar__divider {
  width: 1px;
  height: 32px;
  background: #e0dcd5;
  flex-shrink: 0;
}
.pk-trustbar__item {
  display: flex;
  flex-direction: column;
}
.pk-trustbar__value {
  font-family: 'Cabinet Grotesk', 'Inter', sans-serif;
  font-size: 24px;
  font-weight: 400;
  color: #1a1a1a;
  line-height: 1;
}
.pk-trustbar__sub {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: #a89060;
  margin-top: 4px;
  font-family: 'Inter', sans-serif;
}
@media (max-width: 959px) {
  .pk-trustbar {
    height: auto;
    padding: 24px 16px;
  }
  .pk-trustbar__label { display: none; }
  .pk-trustbar__divider--first { display: none; }
  .pk-trustbar__inner { gap: 32px; }
  .pk-trustbar__value { font-size: 20px; }
}
</style>

<div class="pk-trustbar">
  <div class="pk-trustbar__inner">
    <span class="pk-trustbar__label">In Stock and Ready to Ship in 3 Days</span>
    <div class="pk-trustbar__divider pk-trustbar__divider--first"></div>
    <div class="pk-trustbar__item">
      <span class="pk-trustbar__value">3-Day</span>
      <span class="pk-trustbar__sub">Quick Ship</span>
    </div>
    <div class="pk-trustbar__divider"></div>
    <div class="pk-trustbar__item">
      <span class="pk-trustbar__value">Free</span>
      <span class="pk-trustbar__sub">Shipping over $5k</span>
    </div>
    <div class="pk-trustbar__divider"></div>
    <div class="pk-trustbar__item">
      <span class="pk-trustbar__value">Best Price</span>
      <span class="pk-trustbar__sub">Guarantee</span>
    </div>
    <div class="pk-trustbar__divider"></div>
    <div class="pk-trustbar__item">
      <span class="pk-trustbar__value">5-Year</span>
      <span class="pk-trustbar__sub">Warranty</span>
    </div>
    <div class="pk-trustbar__divider"></div>
    <div class="pk-trustbar__item">
      <span class="pk-trustbar__value">30-Day</span>
      <span class="pk-trustbar__sub">Returns</span>
    </div>
  </div>
</div>

{{#schema}}
{
  "name": "PK Trust Bar",
  "class": "section",
  "settings": [],
  "presets": [{ "name": "PK Trust Bar", "category": "Custom" }]
}
{{/schema}}
